<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Know Your Crew</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;overflow:hidden;background:#0a0a14;font-family:'Courier New',monospace}
body{display:flex;flex-direction:column;height:100vh}

#hud{display:flex;justify-content:space-between;align-items:center;padding:8px 16px;background:#070710;border-bottom:2px solid #534AB7;flex-shrink:0;z-index:50;gap:8px}
#level-badge{font-size:10px;font-weight:700;color:#9FE1CB;background:#0d1a2e;border:1px solid #1D9E75;padding:3px 10px;border-radius:20px;letter-spacing:2px;white-space:nowrap;flex-shrink:0}
#prompt-wrap{text-align:center;flex:1;min-width:0}
#prompt-label{font-size:9px;color:#555;letter-spacing:3px;text-transform:uppercase}
#prompt-name{font-size:24px;font-weight:700;color:#fff;letter-spacing:2px;line-height:1.1;transition:color 0.15s}
#mode-tag{font-size:9px;padding:1px 8px;border-radius:10px;letter-spacing:1px;font-weight:700;margin-top:1px;display:inline-block;opacity:0.9}
#right-hud{text-align:right;flex-shrink:0;min-width:80px}
#score-display{font-size:20px;font-weight:700;color:#FAC775;line-height:1}
#lives-display{font-size:13px;color:#E24B4A;letter-spacing:2px}

#timer-wrap{height:5px;background:#111;flex-shrink:0;z-index:50;position:relative}
#timer-bar{height:100%;width:100%;background:#534AB7;transform-origin:left;transition:background 0.3s}

#arena{flex:1;position:relative;overflow:hidden;background:#0a0a14}

.fc{position:absolute;cursor:pointer;transform-origin:center;will-change:transform,opacity}
.fc-inner{width:100%;height:100%;border-radius:50%;overflow:hidden;border:3px solid #534AB7;position:relative;transition:border-color 0.1s,box-shadow 0.1s}
.fc:hover .fc-inner{border-color:#fff;box-shadow:0 0 18px rgba(255,255,255,0.5)}
.fc-inner img{width:100%;height:100%;object-fit:cover;display:block;pointer-events:none;border-radius:50%}
.fc-label{position:absolute;bottom:-20px;left:50%;transform:translateX(-50%);font-size:10px;font-weight:700;color:#666;white-space:nowrap;letter-spacing:1px;pointer-events:none}
.forbidden-ring{border-color:#E24B4A!important;box-shadow:0 0 16px rgba(226,75,74,0.6)!important;animation:pulse-red 0.8s infinite alternate}
@keyframes pulse-red{from{box-shadow:0 0 8px rgba(226,75,74,0.4)}to{box-shadow:0 0 24px rgba(226,75,74,0.9)}}
.forbidden-x{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:40px;color:#E24B4A;pointer-events:none;text-shadow:0 0 12px #E24B4A;opacity:0;transition:opacity 0.3s;font-weight:700}

#bgflash{position:absolute;inset:0;opacity:0;pointer-events:none;z-index:4;transition:opacity 0.08s}
#glitch{position:absolute;inset:0;pointer-events:none;z-index:5;opacity:0}
#spotlight{position:absolute;inset:0;pointer-events:none;z-index:6}
canvas#sparkles{position:absolute;inset:0;pointer-events:none;z-index:7}
#scanlines{position:absolute;inset:0;pointer-events:none;z-index:3;background:repeating-linear-gradient(0deg,transparent,transparent 3px,rgba(0,0,0,0.035) 3px,rgba(0,0,0,0.035) 4px)}

#feedback{position:absolute;inset:0;pointer-events:none;z-index:30;display:flex;align-items:center;justify-content:center}
#feedback-txt{font-size:80px;font-weight:700;opacity:0;text-shadow:0 0 40px currentColor;transition:opacity 0.08s;pointer-events:none}

/* OVERLAY */
#overlay{position:absolute;inset:0;background:rgba(5,5,20,0.96);display:flex;align-items:center;justify-content:center;z-index:100}
.obox{text-align:center;color:#fff;padding:32px 44px;border:1.5px solid #534AB7;border-radius:16px;background:rgba(10,10,35,0.98);max-width:420px;width:92%}
.obox h1{font-size:26px;color:#9FE1CB;margin-bottom:6px;letter-spacing:3px}
.obox .sub{font-size:12px;color:#555;margin-bottom:20px;line-height:2}
.obox .bscore{font-size:54px;font-weight:700;color:#FAC775;margin:10px 0;text-shadow:0 0 30px #FAC775}
.obox .lvdesc{font-size:11px;color:#534AB7;letter-spacing:3px;margin-bottom:16px}
.btn{background:#534AB7;color:#fff;border:none;border-radius:8px;padding:12px 36px;font-size:14px;font-family:'Courier New',monospace;cursor:pointer;letter-spacing:2px;font-weight:700;transition:background 0.15s,transform 0.1s;margin:4px}
.btn:hover{background:#7F77DD;transform:scale(1.03)}
.btn:active{transform:scale(0.97)}
.btn-sec{background:transparent;border:1.5px solid #534AB7;color:#9FE1CB}
.btn-sec:hover{background:#0d0d2e}
input[type=text]{background:#0d0d2e;border:1.5px solid #534AB7;color:#fff;padding:10px 16px;border-radius:8px;font-family:'Courier New',monospace;font-size:14px;width:190px;text-align:center;letter-spacing:2px;outline:none;margin:8px 0;display:block;margin:8px auto}
input[type=text]:focus{border-color:#9FE1CB}

/* LEVEL ANNOUNCE */
#lvann{position:absolute;inset:0;display:none;flex-direction:column;align-items:center;justify-content:center;pointer-events:none;z-index:80;background:rgba(5,5,20,0.88)}
#lvann-num{font-size:100px;font-weight:700;line-height:1}
#lvann-name{font-size:18px;letter-spacing:6px;margin-top:4px}
#lvann-mode{font-size:11px;letter-spacing:3px;margin-top:6px;color:#888}

/* LB */
#lb-wrap{width:100%;border-collapse:collapse;margin:10px 0;font-size:13px}
#lb-wrap th{color:#534AB7;padding:4px 8px;text-align:left;border-bottom:1px solid #1a1a3a;font-size:10px;letter-spacing:2px}
#lb-wrap td{padding:5px 8px;border-bottom:1px solid #0d0d2e}
</style>
</head>

// SPARKLES ENGINE
// ============================================================
const sparkCanvas = document.getElementById('sparkles');
const sCtx = sparkCanvas.getContext('2d');
let sparkles = [];

function resizeSpark() { sparkCanvas.width = arena.offsetWidth; sparkCanvas.height = arena.offsetHeight; }
window.addEventListener('resize', () => { resizeSpark(); if(gameActive) rebuildArenaSize(); });
resizeSpark();

function addSparkles(x, y, color, n=20) {
  for(let i=0;i<n;i++){
    const a=Math.random()*Math.PI*2, spd=3+Math.random()*10;
    sparkles.push({ x,y, vx:Math.cos(a)*spd, vy:Math.sin(a)*spd-2, life:1, decay:0.018+Math.random()*0.035, r:2+Math.random()*7, color });
  }
}

const SCOLS = ['#FAC775','#9FE1CB','#AFA9EC','#ED93B1','#85B7EB','#fff','#F0997B','#ffff00','#00ffff','#ff00ff'];

function runSparkles() {
  sCtx.clearRect(0,0,sparkCanvas.width,sparkCanvas.height);
  sparkles = sparkles.filter(s=>s.life>0);
  sparkles.forEach(s=>{
    s.x+=s.vx; s.y+=s.vy; s.vy+=0.25; s.vx*=0.93; s.life-=s.decay;
    sCtx.save(); sCtx.globalAlpha=Math.max(0,s.life);
    sCtx.fillStyle=s.color;
    sCtx.beginPath(); sCtx.arc(s.x,s.y,s.r,0,Math.PI*2); sCtx.fill();
    // star arms
    sCtx.strokeStyle=s.color; sCtx.lineWidth=1;
    for(let j=0;j<4;j++){
      const a=j*Math.PI/2+s.life*3;
      sCtx.beginPath();
      sCtx.moveTo(s.x+Math.cos(a)*s.r*2.2, s.y+Math.sin(a)*s.r*2.2);
      sCtx.lineTo(s.x+Math.cos(a+Math.PI)*s.r*0.6, s.y+Math.sin(a+Math.PI)*s.r*0.6);
      sCtx.stroke();
    }
    sCtx.restore();
  });
  requestAnimationFrame(runSparkles);
}
runSparkles();

// SPOTLIGHT ENGINE — suit le curseur / doigt
// ============================================================
const spotlightEl = document.getElementById('spotlight');
let spotCanvas = null, spotCtx = null, spotX = -999, spotY = -999, spotR = 115, spotActive = false;
// Smooth tracking
let spotTargetX = -999, spotTargetY = -999;

function onSpotMove(e) {
  const rect = arena.getBoundingClientRect();
  if(e.touches) {
    spotTargetX = e.touches[0].clientX - rect.left;
    spotTargetY = e.touches[0].clientY - rect.top;
  } else {
    spotTargetX = e.clientX - rect.left;
    spotTargetY = e.clientY - rect.top;
  }
}

function setupSpotlight(active) {
  spotlightEl.innerHTML = '';
  spotCanvas = null;
  spotActive = false;
  arena.removeEventListener('mousemove', onSpotMove);
  arena.removeEventListener('touchmove', onSpotMove);
  if(!active) return;

  spotCanvas = document.createElement('canvas');
  spotCanvas.style.cssText = 'position:absolute;inset:0;width:100%;height:100%;pointer-events:none;z-index:6';
  spotlightEl.appendChild(spotCanvas);
  spotCanvas.width = arena.offsetWidth;
  spotCanvas.height = arena.offsetHeight;

  // Start spotlight in center
  spotX = arena.offsetWidth / 2;
  spotY = arena.offsetHeight / 2;
  spotTargetX = spotX; spotTargetY = spotY;
  spotActive = true;

  arena.addEventListener('mousemove', onSpotMove);
  arena.addEventListener('touchmove', onSpotMove, { passive: true });

  animSpotlight();
}

function animSpotlight() {
  if(!spotCanvas || !spotActive) return;
  // Smooth follow
  spotX += (spotTargetX - spotX) * 0.18;
  spotY += (spotTargetY - spotY) * 0.18;

  const W = spotCanvas.width, H = spotCanvas.height;
  spotCtx = spotCanvas.getContext('2d');
  spotCtx.clearRect(0,0,W,H);
  // Dark overlay
  spotCtx.fillStyle = 'rgba(0,0,0,1)';
  spotCtx.fillRect(0,0,W,H);
  // Cut circle with gradient
  spotCtx.globalCompositeOperation = 'destination-out';
  const grad = spotCtx.createRadialGradient(spotX,spotY,0, spotX,spotY,spotR);
  grad.addColorStop(0,   'rgba(0,0,0,1)');
  grad.addColorStop(0.55,'rgba(0,0,0,1)');
  grad.addColorStop(0.85,'rgba(0,0,0,0.6)');
  grad.addColorStop(1,   'rgba(0,0,0,0)');
  spotCtx.fillStyle = grad;
  spotCtx.beginPath(); spotCtx.arc(spotX,spotY,spotR,0,Math.PI*2); spotCtx.fill();
  spotCtx.globalCompositeOperation = 'source-over';

  requestAnimationFrame(animSpotlight);
}

  arena.style.transform='none';

  setupSpotlight(false);
  promptName.style.color='#fff';
  promptName.style.textShadow='0 0 20px #fff';
  promptName.style.fontSize='24px';
}

function flashBg(color) {
  bgflash.style.background=color; bgflash.style.opacity='1';
  setTimeout(()=>bgflash.style.opacity='0',110);
}

function showFeedback(ok, pts) {
  feedbackTxt.textContent = ok?(pts>0?'+'+pts:'✓'):'✗';
  feedbackTxt.style.color = ok?'#9FE1CB':'#E24B4A';
  feedbackTxt.style.fontSize = ok?'72px':'96px';
  feedbackTxt.style.opacity='1';
  flashBg(ok?'rgba(29,158,117,0.22)':'rgba(226,75,74,0.30)');
  setTimeout(()=>feedbackTxt.style.opacity='0', ok?500:320);
}

function rebuildArenaSize() { resizeSpark(); }

// ============================================================
// ANNOUNCE LEVEL
// ============================================================
const LEVEL_COLORS=['#9FE1CB','#FAC775','#F0997B','#AFA9EC','#ED93B1','#85B7EB','#E24B4A','#5DCAA5','#7F77DD','#ffff00'];
function announceLevel(cfg, cb) {
  lvannNum.textContent=cfg.num; lvannNum.style.color=LEVEL_COLORS[cfg.num-1];
  lvannName2.textContent=cfg.name; lvannName2.style.color=LEVEL_COLORS[cfg.num%10];
  lvannMode.textContent=cfg.chainLen>0?'MODE CHAÎNE x'+cfg.chainLen:'';
  lvannMode.style.color='#FAC775';
  lvann.style.opacity='0'; lvann.style.display='flex'; lvann.style.transition='none';
  requestAnimationFrame(()=>{
    lvann.style.transition='opacity 0.3s'; lvann.style.opacity='1';
    setTimeout(()=>{
      lvann.style.opacity='0';
      setTimeout(()=>{ lvann.style.display='none'; cb(); },320);
    },1000);
  });
}

// ============================================================
// START ROUND
// ============================================================
function startRound() {
  if(!gameActive) return;
  clearRound();
  chainProgress=0;
  const cfg = LEVELS[levelIdx];
  levelBadge.textContent='LEVEL '+cfg.num;
  const AW=arena.offsetWidth, AH=arena.offsetHeight;
  const S=cfg.size;

  // ---- Shuffle positions AND faces independently ----
  // We shuffle the display POSITIONS separately from face pick
  const posShuffle = Array.from({length:6},(_,i)=>i);
  shuffleArr(posShuffle);
  const faceShuffle = [...FACES];
  shuffleArr(faceShuffle);

  // ---- Mode dynamique par round ----
  let roundMode = 'normal';
  if(cfg.chainLen > 0) roundMode = 'chain';
  else if(Math.random() < cfg.forbiddenChance) roundMode = 'forbidden';
  currentRoundMode = roundMode;

  if(roundMode === 'normal'){
    currentTarget = faceShuffle[Math.floor(Math.random()*faceShuffle.length)].name;
    promptLbl.textContent='CLIQUE SUR';
    promptName.textContent=currentTarget;
    promptName.style.color='#fff'; promptName.style.textShadow='0 0 20px #fff'; promptName.style.fontSize='24px';
    modeTag.textContent=''; modeTag.style.background=''; modeTag.style.color='';
  } else if(roundMode === 'forbidden'){
    currentForbidden = faceShuffle[Math.floor(Math.random()*faceShuffle.length)].name;
    promptLbl.textContent='NE CLIQUE PAS SUR';
    promptName.textContent=currentForbidden;
    promptName.style.color='#E24B4A'; promptName.style.textShadow='0 0 20px #E24B4A'; promptName.style.fontSize='24px';
    modeTag.textContent='⚠ NE PAS CLIQUER'; modeTag.style.background='rgba(226,75,74,0.18)'; modeTag.style.color='#E24B4A';
  } else if(roundMode === 'chain'){
    const pool=[...faceShuffle];
    chainTargets=[];
    for(let i=0;i<cfg.chainLen;i++) chainTargets.push(pool[i].name);
    shuffleArr(chainTargets);
    promptLbl.textContent="DANS L'ORDRE →";
    promptName.textContent=chainTargets.join(' → ');
    promptName.style.color='#FAC775'; promptName.style.textShadow='0 0 20px #FAC775';
    promptName.style.fontSize=cfg.chainLen===3?'14px':'18px';
    modeTag.textContent='CHAINE x'+cfg.chainLen; modeTag.style.background='rgba(250,199,117,0.18)'; modeTag.style.color='#FAC775';
  }

  // ---- Spotlight ----
  if(cfg.spotlight) setupSpotlight(true);

  // ---- Rainbow prompt ----
  if(cfg.rainbow && cfg.mode!=='forbidden'){
    let rh=0;
    rainbowInt=setInterval(()=>{
      rh=(rh+8)%360;
      promptName.style.color=`hsl(${rh},100%,70%)`;
      promptName.style.textShadow=`0 0 20px hsl(${rh},100%,70%)`;
    },55);
  }

  // ---- Grid layout with randomized positions ----
  const cols=3, rows=2;
  const areaTop=0, areaH=AH;
  const cellW=(AW-32)/cols, cellH=(areaH-16)/rows;

  faceShuffle.forEach((face,i)=>{
    const slot = posShuffle[i]; // random slot assignment
    const col=slot%cols, row=Math.floor(slot/cols);
    // Position within cell with jitter
    const baseX = 16+col*cellW+cellW/2;
    const baseY = areaTop+8+row*cellH+cellH/2;
    const jx=(Math.random()-0.5)*cellW*0.32, jy=(Math.random()-0.5)*cellH*0.32;
    const cx=Math.max(S/2+4,Math.min(AW-S/2-4, baseX+jx));
    const cy=Math.max(S/2+8,Math.min(AH-S/2-24, baseY+jy));

    // Build DOM
    const el=document.createElement('div');
    el.className='fc';
    el.style.cssText=`width:${S}px;height:${S}px;left:${cx-S/2}px;top:${cy-S/2}px;`;

    const inner=document.createElement('div');
    inner.className='fc-inner';

    const img=document.createElement('img');
    img.src=face.src; img.draggable=false;
    if(cfg.invert) img.style.filter='invert(0.4) hue-rotate(90deg)';
    inner.appendChild(img);

    // Forbidden ring + X
    if(currentRoundMode==='forbidden' && face.name===currentForbidden){
      inner.classList.add('forbidden-ring');
      const xmark=document.createElement('div');
      xmark.className='forbidden-x'; xmark.textContent='✕';
      inner.appendChild(xmark);
      setTimeout(()=>xmark.style.opacity='1',300);
    }

    // Label on level 1
    if(cfg.num<=1){
      const lbl=document.createElement('div');
      lbl.className='fc-label'; lbl.textContent=face.name;
      el.appendChild(lbl);
    }

    el.appendChild(inner);
    arena.appendChild(el);

    // Bounce in from a random edge
    const side=Math.floor(Math.random()*4);
    const offX=side===0?-S-20:side===1?AW+S+20:cx-S/2;
    const offY=side===2?-S-20:side===3?AH+S+20:cy-S/2;
    el.style.left=offX+'px'; el.style.top=offY+'px';
    el.style.opacity='0';
    el.style.transform='scale(0.4)';

    // Animate in with stagger
    const delay=i*60;
    setTimeout(()=>{
      el.style.transition=`left 0.42s cubic-bezier(0.34,1.56,0.64,1),top 0.42s cubic-bezier(0.34,1.56,0.64,1),opacity 0.25s,transform 0.42s cubic-bezier(0.34,1.56,0.64,1)`;
      el.style.left=(cx-S/2)+'px'; el.style.top=(cy-S/2)+'px';
      el.style.opacity='1'; el.style.transform='scale(1)';
    },delay);

    // Ghost
    if(cfg.ghost) inner.style.opacity=(0.2+Math.random()*0.55).toFixed(2);

    // Blur
    if(cfg.blur>0){
      inner.style.filter=(inner.style.filter||'')+` blur(${cfg.blur}px)`;
      let elapsed=0;
      const ubInt=setInterval(()=>{
        elapsed+=120; const ratio=Math.max(0,1-elapsed/maxTime);
        const b=cfg.blur*ratio;
        const base=cfg.invert?'invert(0.4) hue-rotate(90deg)':'';
        img.style.filter=base+(b>0.3?` blur(${b}px)`:'');
        if(elapsed>=maxTime) clearInterval(ubInt);
      },120);
    }

    // Shrink
    if(cfg.shrink){
      let sc=1, shrinkStart=Date.now()+400;
      const sInt=setInterval(()=>{
        const elapsed=Date.now()-shrinkStart;
        if(elapsed<0) return;
        sc=Math.max(0.08,1-(elapsed/(maxTime*0.85)));
        el.style.transform=`scale(${sc})`;
        if(sc<=0.08) clearInterval(sInt);
      },50);
      shrinkInts.push(sInt);
    }

    const card={ el, inner, img, name:face.name, x:cx, y:cy,
      vx:cfg.speed>0?(Math.random()-0.5)*cfg.speed*2:0,
      vy:cfg.speed>0?(Math.random()-0.5)*cfg.speed*2:0,
      angle:0, spinSpd:cfg.spin?(Math.random()-0.5)*2.5:0,
      scaleDir:1, scale:1, wobT:Math.random()*Math.PI*2, hue:Math.random()*360 };
    cards.push(card);

    el.addEventListener('click',()=>{ if(gameActive) onCardClick(face.name, card); });
  });

  // ---- Effects ----
  if(cfg.strobe){
    strobeInt=setInterval(()=>{
      const c=cards[Math.floor(Math.random()*cards.length)];
      if(c){ c.el.style.visibility='hidden'; flashBg('rgba(255,255,255,0.1)'); setTimeout(()=>{ if(c) c.el.style.visibility='visible'; },55+Math.random()*75); }
    },220+Math.random()*200);
  }
  if(cfg.colorbg){
    let ci=0; colorInt=setInterval(()=>{ ci=(ci+1)%BG_COLS.length; arena.style.background=BG_COLS[ci]; },280+Math.random()*180);
  }
  if(cfg.glitch){
    glitchInt=setInterval(()=>{
      const off=Math.floor(Math.random()*12)-6;
      glitchEl.style.cssText=`position:absolute;inset:0;pointer-events:none;z-index:5;opacity:0.55;background:rgba(${Math.random()>0.5?'255,0,100':'0,255,200'},0.13);transform:translate(${off}px,${Math.floor(Math.random()*8)-4}px)`;
      setTimeout(()=>{ glitchEl.style.opacity='0'; glitchEl.style.transform='none'; },45+Math.random()*75);
    },160+Math.random()*240);
  }
  if(cfg.shake){
    shakeInt=setInterval(()=>{
      const sx=(Math.random()-0.5)*9,sy=(Math.random()-0.5)*9;
      arena.style.transform=`translate(${sx}px,${sy}px)`;
      setTimeout(()=>arena.style.transform='none',75);
    },480+Math.random()*380);
  }

  // ---- Animation loop ----
  function animLoop(){
    const AW2=arena.offsetWidth,AH2=arena.offsetHeight;
    cards.forEach(c=>{
      if(!c.el.parentNode)return;
      c.wobT+=0.05;
      if(cfg.speed>0){
        c.x+=c.vx; c.y+=c.vy;
        if(cfg.wobble){ c.x+=Math.sin(c.wobT*1.5)*0.6; c.y+=Math.cos(c.wobT*1.1)*0.6; }
        if(cfg.offscreen){
          if(c.x<-cfg.size)c.x=AW2+cfg.size; if(c.x>AW2+cfg.size)c.x=-cfg.size;
          if(c.y<-cfg.size)c.y=AH2+cfg.size; if(c.y>AH2+cfg.size)c.y=-cfg.size;
        } else {
          if(c.x<cfg.size/2||c.x>AW2-cfg.size/2){ c.vx*=-1; c.x=Math.max(cfg.size/2,Math.min(AW2-cfg.size/2,c.x)); }
          if(c.y<cfg.size/2+8||c.y>AH2-cfg.size/2-20){ c.vy*=-1; c.y=Math.max(cfg.size/2+8,Math.min(AH2-cfg.size/2-20,c.y)); }
        }
        c.el.style.left=(c.x-cfg.size/2)+'px'; c.el.style.top=(c.y-cfg.size/2)+'px';
      }
      if(cfg.spin){ c.angle+=c.spinSpd; }
      if(cfg.zoom){ c.scale+=c.scaleDir*0.007; if(c.scale>1.18||c.scale<0.82)c.scaleDir*=-1; }
      if(cfg.rainbow){ c.hue=(c.hue+2)%360; c.inner.style.borderColor=`hsl(${c.hue},100%,62%)`; c.inner.style.boxShadow=`0 0 14px hsl(${c.hue},100%,50%)`; }
      const tr=[];
      if(cfg.spin) tr.push(`rotate(${c.angle}deg)`);
      if(cfg.zoom) tr.push(`scale(${c.scale})`);
      if(tr.length&&!cfg.shrink) c.el.style.transform=tr.join(' ');
    });
    animIds.push(requestAnimationFrame(animLoop));
  }
  setTimeout(()=>animIds.push(requestAnimationFrame(animLoop)), 350);

  // ---- Timer ----
  maxTime=cfg.time; timeLeft=cfg.time;
  timerBar.style.width='100%'; timerBar.style.background='#534AB7';
  timerBar.style.transition='none';
  timerInt=setInterval(()=>{
    timeLeft-=50;
    const pct=Math.max(0,timeLeft/maxTime*100);
    timerBar.style.width=pct+'%';
    timerBar.style.background=pct<25?'#E24B4A':pct<55?'#BA7517':'#534AB7';
    if(pct<25) flashBg('rgba(226,75,74,0.05)');
    if(timeLeft<=0){ clearInterval(timerInt); loseLife('TROP LENT !'); }
  },50);
}

// ============================================================
// CLICK HANDLERS
// ============================================================
function onCardClick(name, card) {
  const cfg=LEVELS[levelIdx];
  const cx=card.x, cy=card.y;

  if(currentRoundMode==='normal'){
    name===currentTarget ? goodAnswer(cx,cy) : badAnswer(cx,cy);
  } else if(currentRoundMode==='forbidden'){
    name===currentForbidden ? badAnswer(cx,cy) : goodAnswer(cx,cy);
  } else if(currentRoundMode==='chain'){
    if(name===chainTargets[chainProgress]){
      chainProgress++;
      // mini sparkles
      SCOLS.slice(0,3).forEach(c=>addSparkles(cx,cy,c,5));
      if(chainProgress>=chainTargets.length){
        goodAnswer(cx,cy);
      } else {
        // Update prompt to show remaining
        const remaining=chainTargets.slice(chainProgress).join(' → ');
        promptName.textContent=remaining;
        showFeedback(true,0);
      }
    } else {
      badAnswer(cx,cy);
    }
  }
}

function goodAnswer(cx,cy){
  clearRound();
  const pts=Math.max(10,Math.round((timeLeft/maxTime)*110)+15);
  score+=pts; scoreEl.textContent=score;
  showFeedback(true,pts);
  // Big burst
  SCOLS.forEach(c=>addSparkles(cx,cy,c,12));
  addSparkles(cx,cy,'#fff',15);
  roundInLevel++;
  if(roundInLevel>=3){
    roundInLevel=0;
    levelIdx=Math.min(levelIdx+1,LEVELS.length-1);
    setTimeout(()=>announceLevel(LEVELS[levelIdx],startRound),500);
  } else {
    setTimeout(startRound,480);
  }
}

function badAnswer(cx,cy){
  clearRound();
  SCOLS.slice(6,9).forEach(c=>addSparkles(cx,cy,c,10));
  loseLife();
}

function loseLife(msg){
  lives--; livesEl.textContent=livesHTML(lives);
  showFeedback(false,0);
  if(msg){
    const t=document.createElement('div');
    t.style.cssText='position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);font-size:28px;font-weight:700;color:#E24B4A;font-family:Courier New,monospace;pointer-events:none;z-index:40';
    t.textContent=msg; arena.appendChild(t);
    setTimeout(()=>t.remove(),600);
  }
  if(lives<=0){ endGame(); return; }
  setTimeout(startRound,480);
}

// ============================================================
// LEADERBOARD
// ============================================================
async function showLeaderboard(submitMode=false, finalScore=0, finalLevel=0){
  overlay.style.display='flex';
  const medals=['🥇','🥈','🥉'];
  let rows='<tr><td colspan="4" style="text-align:center;color:#534AB7;padding:16px;letter-spacing:2px;font-size:12px">CHARGEMENT...</td></tr>';

  let submitHTML='';
  if(submitMode){
    submitHTML=`
      <div style="background:#0d0d2e;border-radius:8px;padding:14px;margin:12px 0;border:1px solid #1a1a3a">
        <div style="font-size:11px;color:#555;letter-spacing:2px;margin-bottom:6px">TON SCORE : <span style="color:#FAC775;font-size:18px;font-weight:700">${finalScore}</span></div>
        <input type="text" id="pseudo-inp" placeholder="ENTRE TON PSEUDO" maxlength="12" autocomplete="off">
        <button class="btn" id="sbBtn" style="margin-top:6px">ENVOYER</button>
      </div>`;
  }

  document.getElementById('overlay-content').innerHTML=`
    <h1>🏆 CLASSEMENT</h1>
    ${submitHTML}
    <table id="lb-wrap"><thead><tr><th>#</th><th>PSEUDO</th><th style="text-align:right">SCORE</th><th style="text-align:right">NIV</th></tr></thead>
    <tbody>${rows}</tbody></table>
    <div style="margin-top:14px;display:flex;gap:8px;justify-content:center;flex-wrap:wrap">
      <button class="btn" onclick="startGame()">REJOUER</button>
      <button class="btn btn-sec" onclick="document.getElementById('overlay').style.display='none'">FERMER</button>
    </div>`;

  if(submitMode){
    document.getElementById('sbBtn').onclick=async()=>{
      const pseudo=document.getElementById('pseudo-inp').value.trim();
      if(!pseudo){ document.getElementById('pseudo-inp').style.borderColor='#E24B4A'; return; }
      document.getElementById('sbBtn').textContent='...'; document.getElementById('sbBtn').disabled=true;
      await postScore(pseudo,finalScore,finalLevel);
      showLeaderboard(false);
    };
  }

  // Load scores async
  const scores=await getScores();
  let tbody='';
  if(!scores||scores.length===0){
    tbody='<tr><td colspan="4" style="text-align:center;color:#555;padding:16px;font-size:12px">Aucun score — sois le premier !</td></tr>';
  } else {
    scores.forEach((s,i)=>{
      const col=i===0?'#FAC775':i===1?'#aaaaaa':i===2?'#CD7F32':'#888';
      tbody+=`<tr>
        <td style="color:${col}">${medals[i]||(i+1)}</td>
        <td style="font-weight:${i<3?'700':'400'};color:${col}">${s.pseudo}</td>
        <td style="text-align:right;color:#FAC775;font-weight:700">${s.score}</td>
        <td style="text-align:right;color:#534AB7;font-size:10px">LVL${s.niveau}</td>
      </tr>`;
    });
  }
  const tb=document.querySelector('#lb-wrap tbody');
  if(tb) tb.innerHTML=tbody;
}

// ============================================================
// END GAME
// ============================================================
async function endGame(){
  gameActive=false; clearRound();
  // Particle burst finale
  for(let i=0;i<8;i++){
    setTimeout(()=>{
      const x=50+Math.random()*(arena.offsetWidth-100);
      const y=50+Math.random()*(arena.offsetHeight-100);
      SCOLS.forEach(c=>addSparkles(x,y,c,8));
    },i*120);
  }
  const cfg=LEVELS[levelIdx];
  overlay.style.display='flex';
  document.getElementById('overlay-content').innerHTML=`
    <h1 style="color:#E24B4A">GAME OVER</h1>
    <div class="bscore">${score}</div>
    <div class="lvdesc">NIVEAU ${cfg.num} — ${cfg.name}</div>
    <p class="sub">Tes collègues t'ont eu 😈</p>
    <div style="background:#0d0d2e;border-radius:8px;padding:14px;margin:10px 0;border:1px solid #1a1a3a">
      <div style="font-size:10px;color:#555;letter-spacing:2px;margin-bottom:6px">ENTRE TON PSEUDO</div>
      <input type="text" id="pseudo-inp" placeholder="PSEUDO" maxlength="12" autocomplete="off">
      <button class="btn" id="sbBtn" style="margin-top:6px">SOUMETTRE 🏆</button>
    </div>
    <button class="btn btn-sec" onclick="startGame()">REJOUER</button>`;

  document.getElementById('sbBtn').onclick = async () => {
    const pseudo = document.getElementById('pseudo-inp').value.trim();
    if(!pseudo){ document.getElementById('pseudo-inp').style.borderColor='#E24B4A'; return; }
    const btn = document.getElementById('sbBtn');
    btn.textContent='...'; btn.disabled=true;
    await postScore(pseudo, score, cfg.num);
    showLeaderboard(false);
  };
}

// ============================================================
// START GAME
// ============================================================
function startGame(){
  score=0; lives=3; levelIdx=0; roundInLevel=0; gameActive=true;
  scoreEl.textContent='0'; livesEl.textContent=livesHTML(3);
  overlay.style.display='none';
  announceLevel(LEVELS[0],startRound);
}

// ============================================================
// UTILS
// ============================================================
function shuffleArr(arr){
  for(let i=arr.length-1;i>0;i--){
    const j=Math.floor(Math.random()*(i+1));
    [arr[i],arr[j]]=[arr[j],arr[i]];
  }
  return arr;
}

document.getElementById('startBtn').addEventListener('click',startGame);
document.getElementById('lbBtn').addEventListener('click',()=>showLeaderboard(false));
</script>
