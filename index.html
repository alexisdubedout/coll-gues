async function getScores() {
  try {
    const r = await fetch(`${SUPABASE_URL}/rest/v1/scores?order=score.desc&limit=10`, {
      headers: { 'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${SUPABASE_KEY}` }

  } catch(e) { return []; }
}
async function postScore(pseudo, score, niveau) {

    await fetch(`${SUPABASE_URL}/rest/v1/scores`, {
      method: 'POST',
      headers: { 'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${SUPABASE_KEY}`, 'Content-Type': 'application/json', 'Prefer': 'return=minimal' },

    });
  } catch(e) {}
}

// ===================== BOOT SCENE =====================
class BootScene extends Phaser.Scene {
  constructor() { super('Boot'); }
  preload() {
    const g = this.add.graphics();
    g.fillStyle(0x0a0a14); g.fillRect(0,0,800,600);
    const bar = this.add.graphics();
    const txt = this.add.text(400,280,'CHARGEMENT...',{fontFamily:'Courier New',fontSize:'14px',color:'#534AB7',letterSpacing:4}).setOrigin(0.5);
    const W = this.scale.width;

    // Load face images from base64
    FACES.forEach(f => {
      this.load.image(f.name, f.src);
    });

    this.load.on('progress', v => {
      bar.clear();
      bar.fillStyle(0x0d0d2e); bar.fillRect(W/2-150, 300, 300, 6);
      bar.fillStyle(0x534AB7); bar.fillRect(W/2-150, 300, 300*v, 6);
    });
    this.load.on('complete', () => { g.destroy(); bar.destroy(); txt.destroy(); this.scene.start('Menu'); });
  }
}

// ===================== MENU SCENE =====================
class MenuScene extends Phaser.Scene {
  constructor() { super('Menu'); }
  create() {
    const W = this.scale.width, H = this.scale.height;
    this.add.rectangle(0,0,W,H,0x0a0a14).setOrigin(0);

    // Animated background dots
    this.stars = [];
    for(let i=0;i<60;i++){
      const s = this.add.circle(Phaser.Math.Between(0,W), Phaser.Math.Between(0,H), Phaser.Math.FloatBetween(0.5,2), 0xffffff, Phaser.Math.FloatBetween(0.1,0.4));
      this.stars.push({obj:s, speed:Phaser.Math.FloatBetween(0.2,0.8), offset:Math.random()*Math.PI*2});
    }

    // Title
    this.add.text(W/2, H*0.18, 'KNOW YOUR CREW', {
      fontFamily:'Courier New', fontSize: W < 500 ? '28px' : '40px',
      color:'#ffffff', fontStyle:'bold', letterSpacing:4,
      stroke:'#534AB7', strokeThickness:2
    }).setOrigin(0.5);

    this.add.text(W/2, H*0.28, 'RECONNAIS TES COLLÈGUES', {
      fontFamily:'Courier New', fontSize:'13px', color:'#534AB7', letterSpacing:3
    }).setOrigin(0.5);

    // Floating face previews
    const previewFaces = [...FACES].sort(()=>Math.random()-0.5).slice(0,4);
    previewFaces.forEach((f,i) => {
      const angle = (i/4)*Math.PI*2;
      const rx = W*0.28, ry = H*0.14;
      const cx = W/2 + Math.cos(angle)*rx;
      const cy = H/2 + Math.sin(angle)*ry;
      const img = this.add.image(cx, cy, f.name).setDisplaySize(70,70).setAlpha(0.35).setTint(0x534AB7);
      this.tweens.add({ targets:img, y: cy-10, duration:1500+i*300, yoyo:true, repeat:-1, ease:'Sine.easeInOut', delay:i*200 });
    });

    // Play button
    const playBtn = this.createButton(W/2, H*0.62, 'JOUER', 0x534AB7);
    playBtn.on('pointerup', () => {
      this.cameras.main.flash(200, 83, 74, 183);
      this.time.delayedCall(200, () => this.scene.start('Game', { levelIdx: 0, score: 0, lives: 3 }));
    });

    // Leaderboard button
    const lbBtn = this.createButton(W/2, H*0.75, 'CLASSEMENT 🏆', 0x0d0d2e, 0x534AB7);
    lbBtn.on('pointerup', () => this.scene.start('Leaderboard', { fromMenu: true }));

    // Level badges preview
    LEVELS.forEach((l,i) => {
      const x = 40 + (i%5)*((W-80)/5) + ((W-80)/10);
      const y = H*0.88 + Math.floor(i/5)*22;
      this.add.text(x, y, `${l.num}. ${l.name}`, {
        fontFamily:'Courier New', fontSize:'9px', color: i<3?'#9FE1CB':i<6?'#FAC775':i<8?'#F0997B':'#E24B4A', letterSpacing:1
      }).setOrigin(0.5);
    });
  }

  createButton(x, y, label, bgColor, strokeColor=null) {
    const cont = this.add.container(x, y).setSize(220, 44).setInteractive({ useHandCursor:true });
    const bg = this.add.rectangle(0, 0, 220, 44, bgColor, 1).setStrokeStyle(1.5, strokeColor||0x7F77DD);
    bg.setOrigin(0.5);
    const txt = this.add.text(0, 0, label, { fontFamily:'Courier New', fontSize:'14px', color:'#ffffff', letterSpacing:3, fontStyle:'bold' }).setOrigin(0.5);
    cont.add([bg, txt]);
    cont.on('pointerover', () => { this.tweens.add({targets:cont, scaleX:1.04, scaleY:1.04, duration:100}); bg.setFillStyle(strokeColor||0x7F77DD); });
    cont.on('pointerout',  () => { this.tweens.add({targets:cont, scaleX:1, scaleY:1, duration:100}); bg.setFillStyle(bgColor); });
    cont.on('pointerdown', () => this.tweens.add({targets:cont, scaleX:0.96, scaleY:0.96, duration:80}));
    return cont;
  }

  update(t) {
    this.stars.forEach(s => { s.obj.setAlpha(0.1 + 0.3*Math.sin(t*0.001*s.speed + s.offset)); });
  }
}

// ===================== ANNOUNCE SCENE =====================
class AnnounceScene extends Phaser.Scene {
  constructor() { super('Announce'); }
  create(data) {
    const W = this.scale.width, H = this.scale.height;
    const cfg = data.cfg;
    const levelColors = [0x9FE1CB,0xFAC775,0xF0997B,0xAFA9EC,0xED93B1,0x85B7EB,0xE24B4A,0x5DCAA5,0x7F77DD,0xffff00];
    const col = levelColors[(cfg.num-1)%levelColors.length];
    const colHex = '#'+col.toString(16).padStart(6,'0');

    this.add.rectangle(0,0,W,H,0x0a0a14,0.92).setOrigin(0);

    const numTxt = this.add.text(W/2, H/2-40, `${cfg.num}`, {
      fontFamily:'Courier New', fontSize:'110px', color:colHex, fontStyle:'bold'
    }).setOrigin(0.5).setAlpha(0);

    const nameTxt = this.add.text(W/2, H/2+50, cfg.name, {
      fontFamily:'Courier New', fontSize:'18px', color:'#ffffff', letterSpacing:6
    }).setOrigin(0.5).setAlpha(0);

    const modeTxt = this.add.text(W/2, H/2+80, this.getModeLabel(cfg.mode), {
      fontFamily:'Courier New', fontSize:'11px', color:'#888888', letterSpacing:3
    }).setOrigin(0.5).setAlpha(0);

    this.tweens.add({ targets:[numTxt,nameTxt,modeTxt], alpha:1, duration:300, ease:'Power2' });
    this.tweens.add({ targets:numTxt, scaleX:{from:0.6,to:1}, scaleY:{from:0.6,to:1}, duration:400, ease:'Back.easeOut' });

    this.time.delayedCall(1100, () => {
      this.tweens.add({ targets:[numTxt,nameTxt,modeTxt], alpha:0, duration:300, onComplete:() => this.scene.stop().resume('Game') });
    });
  }
  getModeLabel(mode) {
    return { normal:'MODE NORMAL', forbidden:'⚠ MODE INTERDIT', chain2:'MODE CHAÎNE x2', chain3:'MODE CHAÎNE x3' }[mode]||'';
  }
}

// ===================== GAME SCENE =====================
class GameScene extends Phaser.Scene {
  constructor() { super('Game'); }

  init(data) {
    this.levelIdx    = data.levelIdx || 0;
    this.totalScore  = data.score    || 0;
    this.lives       = data.lives    || 3;
    this.roundInLevel = 0;
    this.chainProgress = 0;
    this.chainTargets  = [];
    this.faceObjs      = [];
    this.timers        = [];
    this.activeEffects = [];
    this.spotlightMask = null;
    this.glitchTimer   = null;
    this.strobeTimer   = null;
    this.shrinkTweens  = [];
    this.gameActive    = false;
  }

  create() {
    const W = this.scale.width, H = this.scale.height;
    this.W = W; this.H = H;
    this.bg = this.add.rectangle(0,0,W,H,0x0a0a14).setOrigin(0);

    // HUD
    this.createHUD();

    // Particles emitter
    this.particles = this.add.particles(0, 0, '__DEFAULT', { active:false });

    // Start first round after announce
    this.scene.pause();
    this.scene.launch('Announce', { cfg: LEVELS[this.levelIdx] });
    this.time.delayedCall(100, () => { this.gameActive = true; this.startRound(); });
  }

  createHUD() {
    const W = this.W, H = this.H;
    this.hudBg = this.add.rectangle(0, 0, W, 56, 0x070710).setOrigin(0).setDepth(50);
    this.add.rectangle(0, 55, W, 2, 0x534AB7).setOrigin(0).setDepth(50);

    this.levelTxt = this.add.text(14, 10, 'LEVEL 1', { fontFamily:'Courier New', fontSize:'11px', color:'#9FE1CB', letterSpacing:2 }).setDepth(51);
    this.modeTxt  = this.add.text(14, 28, '', { fontFamily:'Courier New', fontSize:'10px', color:'#534AB7', letterSpacing:1 }).setDepth(51);

    this.promptLabel = this.add.text(W/2, 12, 'CLIQUE SUR', { fontFamily:'Courier New', fontSize:'10px', color:'#555555', letterSpacing:3 }).setOrigin(0.5,0).setDepth(51);
    this.promptName  = this.add.text(W/2, 26, '?', { fontFamily:'Courier New', fontSize:'22px', color:'#ffffff', fontStyle:'bold', letterSpacing:2 }).setOrigin(0.5,0).setDepth(51);

    this.scoreTxt = this.add.text(W-14, 10, '0', { fontFamily:'Courier New', fontSize:'20px', color:'#FAC775', fontStyle:'bold' }).setOrigin(1,0).setDepth(51);
    this.livesTxt = this.add.text(W-14, 34, '♥ ♥ ♥', { fontFamily:'Courier New', fontSize:'13px', color:'#E24B4A' }).setOrigin(1,0).setDepth(51);

    // Timer bar
    this.timerBg  = this.add.rectangle(0, 57, W, 5, 0x111111).setOrigin(0).setDepth(51);
    this.timerBar = this.add.rectangle(0, 57, W, 5, 0x534AB7).setOrigin(0).setDepth(51);
  }

  startRound() {
    if(!this.gameActive) return;
    this.clearRound();
    const cfg = LEVELS[this.levelIdx];
    this.currentCfg = cfg;
    this.chainProgress = 0;

    // Update HUD
    this.levelTxt.setText('LEVEL ' + cfg.num);
    this.updateModeLabel(cfg);
    this.scoreTxt.setText(this.totalScore.toString());
    this.livesTxt.setText(Array(Math.max(0,this.lives)).fill('♥').join(' '));

    // Pick targets
    const shuffled = Phaser.Utils.Array.Shuffle([...FACES]);
    if(cfg.mode==='normal'){
      this.target = shuffled[0].name;
      this.promptLabel.setText('CLIQUE SUR');
      this.promptName.setText(this.target).setColor('#ffffff').setFontSize('22px');
    } else if(cfg.mode==='forbidden'){
      this.forbidden = shuffled[0].name;
      this.promptLabel.setText('NE CLIQUE PAS SUR');
      this.promptName.setText(this.forbidden).setColor('#E24B4A').setFontSize('22px');
    } else if(cfg.mode==='chain2'||cfg.mode==='chain3'){
      const len = cfg.mode==='chain2'?2:3;
      this.chainTargets = shuffled.slice(0,len).map(f=>f.name);
      this.promptLabel.setText('DANS L\'ORDRE →');
      this.promptName.setText(this.chainTargets.join(' → ')).setColor('#FAC775').setFontSize(len===3?'13px':'16px');
    }

    // Spotlight setup
    if(cfg.spotlight) this.setupSpotlight();

    // Spawn faces
    this.spawnFaces(cfg, shuffled);

    // Effects
    if(cfg.glitch) this.startGlitch();
    if(cfg.strobe) this.startStrobe();

    // Timer
    this.startTimer(cfg.time);
  }

  updateModeLabel(cfg) {
    const labels = { normal:'', forbidden:'⚠ MODE INTERDIT', chain2:'MODE CHAÎNE x2', chain3:'MODE CHAÎNE x3' };
    const colors = { normal:'#534AB7', forbidden:'#E24B4A', chain2:'#FAC775', chain3:'#F0997B' };
    this.modeTxt.setText(labels[cfg.mode]||'').setColor(colors[cfg.mode]||'#534AB7');
  }

  setupSpotlight() {
    const W=this.W, H=this.H;
    if(this.spotlightMask) { this.spotlightMask.destroy(); this.spotlightGfx&&this.spotlightGfx.destroy(); }

    // Dark overlay with circular hole using render texture mask
    this.spotlightGfx = this.make.graphics({ x:0, y:0, add:false });
    const mask = this.spotlightGfx.createGeometryMask();

    this.darkOverlay = this.add.rectangle(0,0,W,H,0x000000,0.82).setOrigin(0).setDepth(20);

    // Spotlight position - moves around
    this.spotX = W/2; this.spotY = H/2;
    this.spotRadius = 100;

    // Draw spotlight hole by masking the dark overlay inversely
    // We use a separate gfx approach: just move a bright circle
    this.spotCircle = this.add.graphics().setDepth(21);
    this.drawSpotlight();

    // Tween spotlight movement
    this.spotTween = this.tweens.add({
      targets: this,
      spotX: { from: W*0.2, to: W*0.8 },
      spotY: { from: H*0.3, to: H*0.75 },
      duration: 2000,
      yoyo: true,
      repeat: -1,
      ease: 'Sine.easeInOut',
      onUpdate: () => this.drawSpotlight()
    });

    // Mask all face cards with spotlight reveal
    this.spotlightActive = true;
  }

  drawSpotlight() {
    if(!this.spotCircle) return;
    this.spotCircle.clear();
    // Cut hole: draw full black then erase circle (use blend mode trick)
    this.spotCircle.fillStyle(0x000000, 0.85);
    this.spotCircle.fillRect(0, 57, this.W, this.H-57);
    this.spotCircle.fillStyle(0x000000, 0);
    // Draw "light" as a gradient-ish circle by layering
    for(let r=this.spotRadius; r>0; r-=8){
      const alpha = 0.85*(1-(r/this.spotRadius));
      this.spotCircle.fillStyle(0x000000, alpha);
      this.spotCircle.fillCircle(this.spotX, this.spotY, r);
    }
  }

  spawnFaces(cfg, shuffled) {
    const W=this.W, H=this.H;
    const S = FACE_SIZE;
    const cols=3, rows=2;
    const areaY = 65;
    const areaH = H - areaY;
    const cellW = (W-40)/cols, cellH = (areaH-20)/rows;

    shuffled.forEach((face, i) => {
      const col = i%cols, row = Math.floor(i/cols);
      const cx = 20 + col*cellW + cellW/2 + Phaser.Math.Between(-cellW*0.15, cellW*0.15);
      const cy = areaY + row*cellH + cellH/2 + Phaser.Math.Between(-cellH*0.15, cellH*0.15);

      // Start off-screen for bounce-in
      const startX = Phaser.Math.Between(0,1) ? -S : W+S;
      const startY = cy;

      // Circular crop via RenderTexture
      const rt = this.add.renderTexture(0, 0, S, S).setDepth(10);
      const mask = this.make.graphics({x:0,y:0,add:false});
      mask.fillStyle(0xffffff); mask.fillCircle(S/2, S/2, S/2);
      rt.mask = new Phaser.Display.Masks.GeometryMask(this, mask);

      // Draw face image into RT
      const tmpImg = this.add.image(S/2, S/2, face.name).setDisplaySize(S,S);
      rt.draw(tmpImg, 0, 0);
      tmpImg.destroy();
      rt.setPosition(startX - S/2, startY - S/2);

      // Mirror
      if(cfg.mirror) rt.setFlipX(true);

      // Blur via pipeline (if supported) — fallback: tint
      if(cfg.blur > 0) {
        rt.setAlpha(0.6 + (1-cfg.blur/10)*0.4);
      }

      // Border circle
      const border = this.add.graphics().setDepth(11);
      const borderColor = cfg.mode==='forbidden' && face.name===this.forbidden ? 0xE24B4A :
                          cfg.mode==='chain2'||cfg.mode==='chain3' ? 0xFAC775 : 0x534AB7;
      border.lineStyle(3, borderColor, 1);
      border.strokeCircle(0,0,S/2+2);
      border.setPosition(startX, startY);

      // Forbidden X
      let xmark = null;
      if(cfg.mode==='forbidden' && face.name===this.forbidden){
        xmark = this.add.text(startX, startY, '✕', { fontFamily:'Courier New', fontSize:'38px', color:'#E24B4A', fontStyle:'bold' }).setOrigin(0.5).setDepth(12).setAlpha(0);
        this.tweens.add({ targets:xmark, alpha:1, duration:400, delay:500 });
      }

      // Chain badge
      let badge = null, badgeTxt = null;
      const chainIdx = (cfg.mode==='chain2'||cfg.mode==='chain3') ? this.chainTargets.indexOf(face.name) : -1;
      if(chainIdx >= 0){
        badge = this.add.circle(startX+S/2-8, startY-S/2+8, 13, 0xFAC775).setDepth(13);
        badgeTxt = this.add.text(startX+S/2-8, startY-S/2+8, (chainIdx+1).toString(), { fontFamily:'Courier New', fontSize:'12px', color:'#0a0a14', fontStyle:'bold' }).setOrigin(0.5).setDepth(14);
      }

      // Name label (level 1 & 2 only)
      let nameLabel = null;
      if(cfg.num <= 2){
        nameLabel = this.add.text(startX, startY+S/2+14, face.name, { fontFamily:'Courier New', fontSize:'10px', color:'#666666', letterSpacing:1 }).setOrigin(0.5).setDepth(12).setAlpha(0);
        this.tweens.add({ targets:nameLabel, alpha:1, duration:600, delay:300 });
      }

      // Bounce in
      const delay = i * 80;
      this.tweens.add({
        targets: [rt, border],
        x: { value: cx, duration:500, ease:'Back.easeOut', delay },
        onUpdate: () => {
          rt.setPosition(border.x - S/2, border.y - S/2);
          if(xmark) xmark.setPosition(border.x, border.y);
          if(badge) { badge.setPosition(border.x+S/2-8, border.y-S/2+8); }
          if(badgeTxt) badgeTxt.setPosition(border.x+S/2-8, border.y-S/2+8);
          if(nameLabel) nameLabel.setPosition(border.x, border.y+S/2+14);
          if(mask) mask.setPosition(border.x - S/2, border.y - S/2);
        }
      });

      // Physics movement
      let vx=0, vy=0;
      if(cfg.speed > 0){
        const angle = Phaser.Math.FloatBetween(0, Math.PI*2);
        const spd = cfg.speed * 0.003;
        vx = Math.cos(angle)*spd; vy = Math.sin(angle)*spd;
      }

      // Shrink tween
      let shrinkTween = null;
      if(cfg.shrink){
        shrinkTween = this.tweens.add({
          targets: [rt, border, xmark, badge, badgeTxt, nameLabel].filter(Boolean),
          scaleX: { from:1, to:0.1 }, scaleY: { from:1, to:0.1 },
          duration: cfg.time * 0.85,
          ease: 'Linear',
          delay: delay + 600
        });
      }

      const faceObj = { rt, border, mask, xmark, badge, badgeTxt, nameLabel, shrinkTween, name:face.name, x:cx, y:cy, vx, vy, alive:true };
      this.faceObjs.push(faceObj);

      // Click zone
      const zone = this.add.circle(cx, cy, S/2).setInteractive({ useHandCursor:true }).setDepth(15).setAlpha(0);
      zone.on('pointerup', () => { if(faceObj.alive && this.gameActive) this.onFaceClick(faceObj); });
      faceObj.zone = zone;

      // Hover effect
      zone.on('pointerover', () => { this.tweens.add({ targets:[rt,border], scaleX:1.08, scaleY:1.08, duration:80 }); border.lineStyle(3, 0xffffff, 1); border.strokeCircle(0,0,S/2+2); });
      zone.on('pointerout',  () => { this.tweens.add({ targets:[rt,border], scaleX:1, scaleY:1, duration:80 }); border.lineStyle(3, borderColor, 1); border.strokeCircle(0,0,S/2+2); });
    });
  }

  update(time, delta) {
    if(!this.gameActive || !this.faceObjs.length) return;
    const cfg = this.currentCfg;
    if(!cfg || cfg.speed === 0) return;

    const W=this.W, H=this.H;
    const S=FACE_SIZE;
    const minY=65+S/2, maxY=H-S/2-10;

    this.faceObjs.forEach(f => {
      if(!f.alive) return;
      const spd = delta * cfg.speed;
      f.x += f.vx * spd;
      f.y += f.vy * spd;

      // Bounce
      if(f.x < S/2||f.x>W-S/2) f.vx*=-1;
      if(f.y < minY||f.y>maxY) f.vy*=-1;
      f.x = Phaser.Math.Clamp(f.x, S/2, W-S/2);
      f.y = Phaser.Math.Clamp(f.y, minY, maxY);

      f.border.setPosition(f.x, f.y);
      f.rt.setPosition(f.x-S/2, f.y-S/2);
      if(f.mask) f.mask.setPosition(f.x-S/2, f.y-S/2);
      if(f.zone) f.zone.setPosition(f.x, f.y);
      if(f.xmark) f.xmark.setPosition(f.x, f.y);
      if(f.badge){ f.badge.setPosition(f.x+S/2-8, f.y-S/2+8); }
      if(f.badgeTxt) f.badgeTxt.setPosition(f.x+S/2-8, f.y-S/2+8);
      if(f.nameLabel) f.nameLabel.setPosition(f.x, f.y+S/2+14);
    });
  }

  onFaceClick(faceObj) {
    const cfg = this.currentCfg;
    const cx=faceObj.x, cy=faceObj.y;

    let correct = false;
    if(cfg.mode==='normal'){
      correct = faceObj.name === this.target;
    } else if(cfg.mode==='forbidden'){
      correct = faceObj.name !== this.forbidden;
    } else if(cfg.mode==='chain2'||cfg.mode==='chain3'){
      const expected = this.chainTargets[this.chainProgress];
      if(faceObj.name === expected){
        this.chainProgress++;
        // Mark badge done
        if(faceObj.badge) faceObj.badge.setFillStyle(0x1D9E75);
        this.emitParticles(cx, cy, '#FAC775', 8);
        if(this.chainProgress < this.chainTargets.length){
          const remaining = this.chainTargets.slice(this.chainProgress).join(' → ');
          this.promptName.setText(remaining);
          this.showFeedback(true, 0, cx, cy);
          return;
        }
        correct = true;
      } else {
        correct = false;
      }
    }

    if(correct){
      this.onCorrect(cx, cy);
    } else {
      this.onWrong(cx, cy);
    }
  }

  onCorrect(cx, cy) {
    this.clearRound();
    const elapsed = this.timerMax - this.timerRemaining;
    const pts = Math.max(10, Math.round((1 - elapsed/this.timerMax)*100) + 20);
    this.totalScore += pts;
    this.scoreTxt.setText(this.totalScore.toString());
    this.showFeedback(true, pts, cx, cy);
    this.emitBurst(cx, cy);
    this.cameras.main.flash(150, 29, 158, 117, true);

    this.roundInLevel++;
    if(this.roundInLevel >= 3){
      this.roundInLevel = 0;
      this.levelIdx = Math.min(this.levelIdx+1, LEVELS.length-1);
      this.time.delayedCall(600, () => {
        this.scene.pause();
        this.scene.launch('Announce', { cfg: LEVELS[this.levelIdx] });
        this.time.delayedCall(200, () => this.startRound());
      });
    } else {
      this.time.delayedCall(500, () => this.startRound());
    }
  }

  onWrong(cx, cy) {
    this.clearRound();
    this.lives--;
    this.livesTxt.setText(Array(Math.max(0,this.lives)).fill('♥').join(' '));
    this.showFeedback(false, 0, cx, cy);
    this.emitParticles(cx, cy, '#E24B4A', 20);
    this.cameras.main.shake(300, 0.012);
    this.cameras.main.flash(200, 226, 75, 74, true);

    if(this.lives <= 0){
      this.time.delayedCall(700, () => this.endGame());
    } else {
      this.time.delayedCall(500, () => this.startRound());
    }
  }

  showFeedback(ok, pts, cx, cy) {
    const txt = ok ? (pts > 0 ? '+'+pts : '✓') : '✗';
    const color = ok ? '#9FE1CB' : '#E24B4A';
    const label = this.add.text(cx, cy, txt, {
      fontFamily:'Courier New', fontSize: ok&&pts>0 ? '48px':'64px',
      color, fontStyle:'bold', stroke: ok?'#0d2e1a':'#2e0d0d', strokeThickness:3
    }).setOrigin(0.5).setDepth(40);
    this.tweens.add({ targets:label, y:cy-60, alpha:0, duration:700, ease:'Power2', onComplete:()=>label.destroy() });
  }

  emitParticles(x, y, color, count) {
    const hexColor = parseInt(color.replace('#',''), 16);
    for(let i=0;i<count;i++){
      const angle = Phaser.Math.FloatBetween(0, Math.PI*2);
      const spd   = Phaser.Math.FloatBetween(80, 280);
      const p = this.add.circle(x, y, Phaser.Math.FloatBetween(3,8), hexColor).setDepth(35);
      this.tweens.add({
        targets:p, x:x+Math.cos(angle)*spd*0.8, y:y+Math.sin(angle)*spd*0.8+spd*0.3,
        alpha:0, scaleX:0.1, scaleY:0.1, duration:Phaser.Math.Between(400,800),
        ease:'Power2', onComplete:()=>p.destroy()
      });
    }
  }

  emitBurst(x, y) {
    SPARKLE_COLS.forEach((c,i) => {
      this.time.delayedCall(i*30, () => this.emitParticles(x, y, c, 6));
    });
    // Star shapes
    for(let i=0;i<8;i++){
      const angle = (i/8)*Math.PI*2;
      const star = this.add.star(x, y, 4, 3, 9, 0xFFFFFF).setDepth(36).setAlpha(0.9);
      this.tweens.add({
        targets:star, x:x+Math.cos(angle)*150, y:y+Math.sin(angle)*150,
        angle:360, alpha:0, scaleX:0.2, scaleY:0.2,
        duration:600, ease:'Power2', onComplete:()=>star.destroy()
      });
    }
  }

  startGlitch() {
    const W=this.W, H=this.H;
    this.glitchTimer = this.time.addEvent({
      delay: 180, loop:true, callback:()=>{
        const g = this.add.rectangle(
          Phaser.Math.Between(0,W), Phaser.Math.Between(57,H),
          W, Phaser.Math.Between(2,12),
          Phaser.Math.Between(0,1)?0xff0064:0x00ffcc, 0.3
        ).setOrigin(0).setDepth(22);
        this.tweens.add({ targets:g, alpha:0, x: g.x+Phaser.Math.Between(-8,8), duration:80, onComplete:()=>g.destroy() });
      }
    });
  }

  startStrobe() {
    this.strobeTimer = this.time.addEvent({
      delay: 300, loop:true, callback:()=>{
        const f = this.faceObjs[Phaser.Math.Between(0, this.faceObjs.length-1)];
        if(f&&f.rt){
          f.rt.setVisible(false);
          this.time.delayedCall(70+Phaser.Math.Between(0,80), ()=>{ if(f&&f.rt) f.rt.setVisible(true); });
        }
      }
    });
  }

  startTimer(duration) {
    this.timerMax = duration;
    this.timerRemaining = duration;
    const W = this.W;
    this.timerBar.setSize(W, 5).setFillStyle(0x534AB7);

    if(this.timerTween) this.timerTween.destroy();
    this.timerTween = this.tweens.add({
      targets: this.timerBar,
      displayWidth: 0,
      duration,
      ease: 'Linear',
      onUpdate: (tween) => {
        this.timerRemaining = duration * (1-tween.progress);
        const pct = 1-tween.progress;
        const col = pct<0.25 ? 0xE24B4A : pct<0.55 ? 0xBA7517 : 0x534AB7;
        this.timerBar.setFillStyle(col);
      },
      onComplete: () => { if(this.gameActive) this.onTimeout(); }
    });
  }

  onTimeout() {
    this.clearRound();
    this.lives--;
    this.livesTxt.setText(Array(Math.max(0,this.lives)).fill('♥').join(' '));
    this.cameras.main.shake(200, 0.01);
    this.cameras.main.flash(200, 226, 75, 74, true);
    const cx=this.W/2, cy=this.H/2;
    const txt=this.add.text(cx, cy, 'TROP LENT !',{fontFamily:'Courier New',fontSize:'36px',color:'#E24B4A',fontStyle:'bold'}).setOrigin(0.5).setDepth(40);
    this.tweens.add({targets:txt,y:cy-60,alpha:0,duration:700,onComplete:()=>txt.destroy()});
    if(this.lives<=0){ this.time.delayedCall(700,()=>this.endGame()); }
    else { this.time.delayedCall(500,()=>this.startRound()); }
  }

  clearRound() {
    // Stop timers
    if(this.timerTween){ this.timerTween.destroy(); this.timerTween=null; }
    if(this.glitchTimer){ this.glitchTimer.destroy(); this.glitchTimer=null; }
    if(this.strobeTimer){ this.strobeTimer.destroy(); this.strobeTimer=null; }
    if(this.spotTween){ this.spotTween.destroy(); this.spotTween=null; }
    if(this.spotCircle){ this.spotCircle.destroy(); this.spotCircle=null; }
    if(this.darkOverlay){ this.darkOverlay.destroy(); this.darkOverlay=null; }

    // Destroy face objects
    this.faceObjs.forEach(f => {
      [f.rt,f.border,f.mask,f.xmark,f.badge,f.badgeTxt,f.nameLabel,f.zone].forEach(o=>{ if(o&&o.destroy) try{o.destroy();}catch(e){} });
      if(f.shrinkTween) f.shrinkTween.destroy();
    });
    this.faceObjs = [];
    this.bg.setFillStyle(0x0a0a14);
    this.spotlightActive = false;
  }

  endGame() {
    this.gameActive = false;
    this.clearRound();
    this.scene.start('GameOver', { score: this.totalScore, levelIdx: this.levelIdx });
  }
}

// ===================== GAME OVER SCENE =====================
class GameOverScene extends Phaser.Scene {
  constructor() { super('GameOver'); }

  async create(data) {
    const W = this.scale.width, H = this.scale.height;
    this.finalScore = data.score || 0;
    this.finalLevel = data.levelIdx || 0;

    this.add.rectangle(0,0,W,H,0x0a0a14).setOrigin(0);

    // Burst particles
    for(let i=0;i<12;i++){
      this.time.delayedCall(i*100, ()=>{
        const x=Phaser.Math.Between(50,W-50), y=Phaser.Math.Between(100,H-100);
        for(let j=0;j<15;j++){
          const angle=Math.random()*Math.PI*2, spd=Phaser.Math.Between(60,200);
          const col=parseInt(SPARKLE_COLS[Phaser.Math.Between(0,SPARKLE_COLS.length-1)].replace('#',''),16);
          const p=this.add.circle(x,y,Phaser.Math.Between(3,8),col);
          this.tweens.add({targets:p,x:x+Math.cos(angle)*spd,y:y+Math.sin(angle)*spd,alpha:0,scaleX:0.1,scaleY:0.1,duration:Phaser.Math.Between(500,1000),ease:'Power2',onComplete:()=>p.destroy()});
        }
      });
    }

    const cfg = LEVELS[Math.min(this.finalLevel, LEVELS.length-1)];

    this.add.text(W/2, H*0.12, 'GAME OVER', { fontFamily:'Courier New', fontSize:'36px', color:'#E24B4A', fontStyle:'bold', letterSpacing:4 }).setOrigin(0.5);
    this.add.text(W/2, H*0.22, this.finalScore.toString(), { fontFamily:'Courier New', fontSize:'64px', color:'#FAC775', fontStyle:'bold' }).setOrigin(0.5);
    this.add.text(W/2, H*0.33, `NIVEAU ${cfg.num} — ${cfg.name}`, { fontFamily:'Courier New', fontSize:'12px', color:'#534AB7', letterSpacing:3 }).setOrigin(0.5);

    // Submit form
    const formBg = this.add.rectangle(W/2, H*0.50, 280, 90, 0x0d0d2e).setOrigin(0.5).setStrokeStyle(1, 0x1a1a3a);
    this.add.text(W/2, H*0.44, 'ENTRE TON PSEUDO', { fontFamily:'Courier New', fontSize:'11px', color:'#555555', letterSpacing:2 }).setOrigin(0.5);

    // HTML input overlay
    this.pseudoInput = this.createInput(W/2, H*0.50);

    // Submit button
    const submitCont = this.createButton(W/2, H*0.63, 'SOUMETTRE LE SCORE', 0x534AB7);
    submitCont.on('pointerup', async () => {
      const pseudo = this.pseudoInput ? this.pseudoInput.value.trim() : '';
      if(!pseudo){ if(this.pseudoInput) this.pseudoInput.style.borderColor='#E24B4A'; return; }
      submitCont.setAlpha(0.5);
      await postScore(pseudo, this.finalScore, cfg.num);
      this.removeInput();
      this.scene.start('Leaderboard', { fromMenu:false, score:this.finalScore });
    });

    const replayCont = this.createButton(W/2, H*0.76, 'REJOUER', 0x0d0d2e, 0x534AB7);
    replayCont.on('pointerup', () => { this.removeInput(); this.scene.start('Game', { levelIdx:0, score:0, lives:3 }); });

    const menuCont = this.createButton(W/2, H*0.87, 'MENU', 0x0d0d2e, 0x333355);
    menuCont.on('pointerup', () => { this.removeInput(); this.scene.start('Menu'); });
  }

  createInput(x, y) {
    const inp = document.createElement('input');
    inp.type = 'text'; inp.maxLength = 12; inp.autocomplete = 'off';
    inp.placeholder = 'PSEUDO';
    inp.style.cssText = `position:fixed;left:50%;transform:translateX(-50%);top:${y/this.scale.height*100}%;width:180px;background:#0d0d2e;border:1px solid #534AB7;color:#fff;padding:8px 14px;font-family:'Courier New',monospace;font-size:14px;text-align:center;letter-spacing:2px;outline:none;border-radius:4px;z-index:1000;`;
    document.body.appendChild(inp);
    this.inputEl = inp;
    return inp;
  }

  removeInput() { if(this.inputEl){ this.inputEl.remove(); this.inputEl=null; } }

  createButton(x, y, label, bgColor, strokeColor) {
    const cont = this.add.container(x, y).setSize(240,40).setInteractive({useHandCursor:true});
    const bg = this.add.rectangle(0,0,240,40,bgColor).setOrigin(0.5).setStrokeStyle(1.5,strokeColor||0x7F77DD);
    const txt = this.add.text(0,0,label,{fontFamily:'Courier New',fontSize:'13px',color:'#ffffff',letterSpacing:2,fontStyle:'bold'}).setOrigin(0.5);
    cont.add([bg,txt]);
    cont.on('pointerover',()=>{ this.tweens.add({targets:cont,scaleX:1.04,scaleY:1.04,duration:100}); bg.setFillStyle(strokeColor||0x7F77DD); });
    cont.on('pointerout', ()=>{ this.tweens.add({targets:cont,scaleX:1,scaleY:1,duration:100}); bg.setFillStyle(bgColor); });
    return cont;
  }

  shutdown() { this.removeInput(); }
}

// ===================== LEADERBOARD SCENE =====================
class LeaderboardScene extends Phaser.Scene {
  constructor() { super('Leaderboard'); }

  async create(data) {
    const W=this.scale.width, H=this.scale.height;
    this.add.rectangle(0,0,W,H,0x0a0a14).setOrigin(0);
    this.add.text(W/2, 50, '🏆 CLASSEMENT', {fontFamily:'Courier New',fontSize:'26px',color:'#FAC775',fontStyle:'bold',letterSpacing:3}).setOrigin(0.5);

    const loading = this.add.text(W/2,H/2,'CHARGEMENT...',{fontFamily:'Courier New',fontSize:'13px',color:'#534AB7',letterSpacing:3}).setOrigin(0.5);
    const scores = await getScores();
    loading.destroy();

    const medals=['🥇','🥈','🥉'];
    const rowColors=[0xFAC775,0xaaaaaa,0xCD7F32,0x888888];

    if(scores.length===0){
      this.add.text(W/2,H/2,'Aucun score encore.\nSois le premier !',{fontFamily:'Courier New',fontSize:'14px',color:'#555',align:'center'}).setOrigin(0.5);
    } else {
      scores.forEach((s,i)=>{
        const y = 110 + i*42;
        const rowBg = this.add.rectangle(W/2, y, W-40, 36, i===0?0x1a1400:0x0d0d1e).setOrigin(0.5).setStrokeStyle(0.5,0x1a1a3a);
        this.add.text(30, y, medals[i]||(i+1).toString(), {fontFamily:'Courier New',fontSize:'16px',color:'#'+rowColors[Math.min(i,3)].toString(16).padStart(6,'0')}).setOrigin(0,0.5);
        this.add.text(70, y, s.pseudo, {fontFamily:'Courier New',fontSize:'15px',color:'#'+rowColors[Math.min(i,3)].toString(16).padStart(6,'0'),fontStyle:i<3?'bold':'normal'}).setOrigin(0,0.5);
        this.add.text(W-100, y, s.score.toString(), {fontFamily:'Courier New',fontSize:'16px',color:'#FAC775',fontStyle:'bold'}).setOrigin(0,0.5);
        this.add.text(W-30, y, 'LVL'+s.niveau, {fontFamily:'Courier New',fontSize:'10px',color:'#534AB7'}).setOrigin(1,0.5);
      });
    }

    const replayCont = this.createButton(W/2, H-90, 'REJOUER', 0x534AB7);
    replayCont.on('pointerup',()=>this.scene.start('Game',{levelIdx:0,score:0,lives:3}));
    const menuCont = this.createButton(W/2, H-45, 'MENU', 0x0d0d2e, 0x534AB7);
    menuCont.on('pointerup',()=>this.scene.start('Menu'));
  }

  createButton(x,y,label,bgColor,strokeColor){
    const cont=this.add.container(x,y).setSize(200,36).setInteractive({useHandCursor:true});
    const bg=this.add.rectangle(0,0,200,36,bgColor).setOrigin(0.5).setStrokeStyle(1.5,strokeColor||0x7F77DD);
    const txt=this.add.text(0,0,label,{fontFamily:'Courier New',fontSize:'13px',color:'#ffffff',letterSpacing:2,fontStyle:'bold'}).setOrigin(0.5);
    cont.add([bg,txt]);
    cont.on('pointerover',()=>{ this.tweens.add({targets:cont,scaleX:1.04,scaleY:1.04,duration:100}); bg.setFillStyle(strokeColor||0x7F77DD); });
    cont.on('pointerout', ()=>{ this.tweens.add({targets:cont,scaleX:1,scaleY:1,duration:100}); bg.setFillStyle(bgColor); });
    return cont;
  }
}

const config = {
  type: Phaser.AUTO,
  parent: 'game-container',
  backgroundColor: '#0a0a14',
  scale: {
    mode: Phaser.Scale.FIT,
    autoCenter: Phaser.Scale.CENTER_BOTH,
    width: 480,
    height: 780,
  },
  scene: [BootScene, MenuScene, AnnounceScene, GameScene, GameOverScene, LeaderboardScene],
  fps: { target:60 },
};

const game = new Phaser.Game(config);
